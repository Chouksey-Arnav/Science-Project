<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Germ Guardians: Outbreak Defenders</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com"></script>
<style>
:root{
  --bg-deep:#080C18;
  --bg-card:rgba(15,23,42,0.85);
  --bg-card-solid:#0F1729;
  --cyan:#06B6D4;
  --cyan-dark:#0891B2;
  --yellow:#FACC15;
  --coral:#F97316;
  --lime:#84CC16;
  --red:#EF4444;
  --purple:#A855F7;
  --green:#10B981;
  --white:#F8FAFC;
  --gray:#94A3B8;
  --navy:#1E3A5F;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100vh;overflow-x:hidden}
body{
  background:var(--bg-deep);
  font-family:'Nunito',sans-serif;
  color:var(--white);
  background-image:
    radial-gradient(ellipse at 15% 15%,rgba(6,182,212,0.12) 0%,transparent 45%),
    radial-gradient(ellipse at 85% 85%,rgba(168,85,247,0.12) 0%,transparent 45%),
    radial-gradient(ellipse at 85% 15%,rgba(249,115,22,0.08) 0%,transparent 40%),
    radial-gradient(ellipse at 15% 85%,rgba(132,204,22,0.08) 0%,transparent 40%);
  background-attachment:fixed;
}
.ff{font-family:'Fredoka One',cursive}
.mono{font-family:'Space Mono',monospace}

/* ─── GRID DOTS BACKGROUND ─── */
body::before{
  content:'';
  position:fixed;inset:0;
  background-image:radial-gradient(rgba(6,182,212,0.15) 1px,transparent 1px);
  background-size:32px 32px;
  pointer-events:none;z-index:0;
}
#app{position:relative;z-index:1;min-height:100vh}

/* ─── GLASS CARD ─── */
.glass{
  background:var(--bg-card);
  backdrop-filter:blur(24px);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:24px;
}
.glass-bright{
  background:rgba(6,182,212,0.06);
  backdrop-filter:blur(24px);
  border:1px solid rgba(6,182,212,0.25);
  border-radius:20px;
}

/* ─── BUTTONS ─── */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:14px 28px;border-radius:14px;font-weight:800;font-size:1rem;
  cursor:pointer;border:none;transition:all 0.2s;
  font-family:'Nunito',sans-serif;letter-spacing:0.01em;
}
.btn:active{transform:scale(0.96)}
.btn-cyan{background:var(--cyan);color:#fff;box-shadow:0 0 20px rgba(6,182,212,0.4)}
.btn-cyan:hover{background:var(--cyan-dark);box-shadow:0 0 35px rgba(6,182,212,0.6);transform:translateY(-2px)}
.btn-yellow{background:var(--yellow);color:#1a0a00;box-shadow:0 0 20px rgba(250,204,21,0.35)}
.btn-yellow:hover{box-shadow:0 0 35px rgba(250,204,21,0.55);transform:translateY(-2px)}
.btn-lime{background:var(--lime);color:#1a2e00;box-shadow:0 0 20px rgba(132,204,22,0.35)}
.btn-lime:hover{box-shadow:0 0 35px rgba(132,204,22,0.55);transform:translateY(-2px)}
.btn-coral{background:var(--coral);color:#fff;box-shadow:0 0 20px rgba(249,115,22,0.35)}
.btn-coral:hover{box-shadow:0 0 35px rgba(249,115,22,0.55);transform:translateY(-2px)}
.btn-outline{background:transparent;color:var(--cyan);border:2px solid var(--cyan)}
.btn-outline:hover{background:rgba(6,182,212,0.1)}
.btn-ghost{background:rgba(255,255,255,0.06);color:var(--white);border:1px solid rgba(255,255,255,0.12)}
.btn-ghost:hover{background:rgba(255,255,255,0.12)}
.btn-lg{padding:18px 40px;font-size:1.2rem;border-radius:18px}
.btn-sm{padding:10px 20px;font-size:0.875rem;border-radius:10px}

/* ─── OPTION BUTTONS ─── */
.opt{
  width:100%;text-align:left;padding:16px 20px;border-radius:14px;
  border:2px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);
  color:var(--white);font-family:'Nunito',sans-serif;font-weight:700;font-size:1rem;
  cursor:pointer;transition:all 0.2s;margin-bottom:10px;
}
.opt:hover{border-color:var(--cyan);background:rgba(6,182,212,0.1);transform:translateX(4px)}
.opt.selected{border-color:var(--cyan);background:rgba(6,182,212,0.15)}
.opt.correct{border-color:var(--lime);background:rgba(132,204,22,0.15);color:var(--lime)}
.opt.wrong{border-color:var(--red);background:rgba(239,68,68,0.15);color:var(--red)}
.opt.partial-correct{border-color:var(--lime);background:rgba(132,204,22,0.12)}
.opt.partial-wrong{border-color:var(--red);background:rgba(239,68,68,0.12)}
.opt:disabled{cursor:not-allowed}

/* ─── OUTBREAK METER ─── */
.meter-bar{height:20px;border-radius:10px;background:rgba(255,255,255,0.1);overflow:hidden;position:relative}
.meter-fill{
  height:100%;border-radius:10px;transition:width 0.6s cubic-bezier(0.34,1.56,0.64,1);
  background:linear-gradient(90deg,#10B981 0%,#FACC15 50%,#EF4444 100%);
  position:relative;
}
.meter-fill::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(0deg,transparent 50%,rgba(255,255,255,0.2) 100%);
}

/* ─── TIMER ─── */
.timer-ring{
  width:64px;height:64px;border-radius:50%;
  background:conic-gradient(var(--cyan) var(--pct,100%),rgba(255,255,255,0.1) 0%);
  display:flex;align-items:center;justify-content:center;
  position:relative;
}
.timer-ring::before{
  content:'';position:absolute;inset:6px;border-radius:50%;background:var(--bg-deep);
}
.timer-num{position:relative;z-index:1;font-family:'Fredoka One',cursive;font-size:1.1rem;color:var(--cyan)}

/* ─── ANIMATIONS ─── */
@keyframes float{
  0%,100%{transform:translateY(0) rotate(-3deg)}
  50%{transform:translateY(-18px) rotate(3deg)}
}
@keyframes floatB{
  0%,100%{transform:translateY(0) rotate(2deg)}
  50%{transform:translateY(-14px) rotate(-4deg)}
}
@keyframes spin-slow{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
@keyframes pulse-glow{
  0%,100%{filter:drop-shadow(0 0 8px currentColor)}
  50%{filter:drop-shadow(0 0 24px currentColor) drop-shadow(0 0 48px currentColor)}
}
@keyframes pop-in{
  0%{transform:scale(0) rotate(-15deg);opacity:0}
  75%{transform:scale(1.08) rotate(3deg)}
  100%{transform:scale(1) rotate(0);opacity:1}
}
@keyframes slide-up{
  from{transform:translateY(30px);opacity:0}
  to{transform:translateY(0);opacity:1}
}
@keyframes slide-in-right{
  from{transform:translateX(60px);opacity:0}
  to{transform:translateX(0);opacity:1}
}
@keyframes shake{
  0%,100%{transform:translateX(0)}
  20%{transform:translateX(-10px)}
  40%{transform:translateX(10px)}
  60%{transform:translateX(-6px)}
  80%{transform:translateX(6px)}
}
@keyframes confetti-fall{
  0%{transform:translateY(-20px) rotate(0deg) scale(1);opacity:1}
  100%{transform:translateY(100vh) rotate(720deg) scale(0.5);opacity:0}
}
@keyframes star-burst{
  0%{transform:scale(0);opacity:1}
  100%{transform:scale(3);opacity:0}
}
@keyframes progress-fill{
  from{width:0%}
}
@keyframes ticker{
  0%{transform:translateX(0)}
  100%{transform:translateX(-50%)}
}
@keyframes glow-border{
  0%,100%{border-color:rgba(6,182,212,0.3)}
  50%{border-color:rgba(6,182,212,0.8);box-shadow:0 0 20px rgba(6,182,212,0.3)}
}

.float-a{animation:float 3.2s ease-in-out infinite}
.float-b{animation:floatB 2.8s ease-in-out infinite 0.4s}
.float-c{animation:float 3.6s ease-in-out infinite 0.8s}
.float-d{animation:floatB 3s ease-in-out infinite 1.2s}
.pop-in{animation:pop-in 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards}
.slide-up{animation:slide-up 0.4s ease-out forwards}
.slide-in-r{animation:slide-in-right 0.4s ease-out forwards}
.glow-border-anim{animation:glow-border 2s ease-in-out infinite}

/* ─── LEADERBOARD ─── */
.lb-row{
  display:grid;grid-template-columns:48px 1fr auto auto;
  align-items:center;gap:12px;padding:14px 20px;border-radius:14px;
  border:1px solid rgba(255,255,255,0.06);background:rgba(255,255,255,0.03);
  margin-bottom:8px;transition:all 0.2s;
}
.lb-row:hover{background:rgba(6,182,212,0.06);border-color:rgba(6,182,212,0.2)}
.lb-row.gold{background:rgba(250,204,21,0.08);border-color:rgba(250,204,21,0.3)}
.lb-row.silver{background:rgba(148,163,184,0.08);border-color:rgba(148,163,184,0.3)}
.lb-row.bronze{background:rgba(249,115,22,0.08);border-color:rgba(249,115,22,0.3)}

/* ─── SELECT-ALL CHECKBOXES ─── */
.check-opt{
  display:flex;align-items:center;gap:14px;padding:14px 18px;
  border-radius:12px;border:2px solid rgba(255,255,255,0.1);
  background:rgba(255,255,255,0.03);cursor:pointer;transition:all 0.2s;
  margin-bottom:8px;font-weight:700;font-size:0.95rem;
}
.check-opt:hover{border-color:var(--cyan);background:rgba(6,182,212,0.08)}
.check-opt.picked{border-color:var(--cyan);background:rgba(6,182,212,0.12)}
.check-opt.reveal-good{border-color:var(--lime);background:rgba(132,204,22,0.12);color:var(--lime)}
.check-opt.reveal-bad{border-color:var(--red);background:rgba(239,68,68,0.12);color:var(--red)}
.check-box{
  width:24px;height:24px;border-radius:6px;border:2px solid rgba(255,255,255,0.3);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.2s;
}
.check-opt.picked .check-box{background:var(--cyan);border-color:var(--cyan)}
.check-opt.reveal-good .check-box{background:var(--lime);border-color:var(--lime)}
.check-opt.reveal-bad .check-box{background:var(--red);border-color:var(--red)}

/* ─── CONFETTI CANVAS ─── */
#confetti-canvas{
  position:fixed;inset:0;pointer-events:none;z-index:9999;
}

/* ─── TICKER ─── */
.ticker-wrap{overflow:hidden;white-space:nowrap;background:rgba(6,182,212,0.08);border-top:1px solid rgba(6,182,212,0.2);border-bottom:1px solid rgba(6,182,212,0.2);padding:8px 0}
.ticker-inner{display:inline-flex;animation:ticker 30s linear infinite}

/* ─── CERTIFICATE ─── */
.certificate{
  border:3px solid var(--yellow);
  background:linear-gradient(135deg,rgba(250,204,21,0.05),rgba(6,182,212,0.05));
  border-radius:20px;padding:32px;position:relative;overflow:hidden;
}
.certificate::before{
  content:'★ ★ ★';position:absolute;top:12px;right:16px;
  color:rgba(250,204,21,0.2);font-size:1.5rem;letter-spacing:8px;
}

/* ─── INPUT ─── */
.inp{
  width:100%;padding:14px 18px;border-radius:12px;
  background:rgba(255,255,255,0.06);border:2px solid rgba(255,255,255,0.12);
  color:var(--white);font-family:'Nunito',sans-serif;font-weight:700;font-size:1rem;
  outline:none;transition:all 0.2s;
}
.inp:focus{border-color:var(--cyan);background:rgba(6,182,212,0.08)}
.inp::placeholder{color:var(--gray)}

/* ─── BADGE ─── */
.badge{
  display:inline-flex;align-items:center;gap:6px;padding:4px 14px;
  border-radius:99px;font-size:0.8rem;font-weight:800;
}
.badge-cyan{background:rgba(6,182,212,0.2);color:var(--cyan);border:1px solid rgba(6,182,212,0.4)}
.badge-yellow{background:rgba(250,204,21,0.2);color:var(--yellow);border:1px solid rgba(250,204,21,0.4)}
.badge-lime{background:rgba(132,204,22,0.2);color:var(--lime);border:1px solid rgba(132,204,22,0.4)}
.badge-red{background:rgba(239,68,68,0.2);color:var(--red);border:1px solid rgba(239,68,68,0.4)}

/* ─── RESPONSIVE ─── */
@media(max-width:640px){
  .btn-lg{padding:14px 24px;font-size:1rem}
  .ff.text-6xl{font-size:2.5rem}
}
</style>
</head>

let AC = null;
function getAC(){ if(!AC && G.soundOn){ try{ AC=new(window.AudioContext||window.webkitAudioContext)(); }catch(e){} } return AC; }
function beep(freq=440, dur=0.12, type='square', vol=0.18, delay=0){
  if(!G.soundOn) return;
  const ac=getAC(); if(!ac) return;
  const o=ac.createOscillator(), g=ac.createGain();
  o.connect(g); g.connect(ac.destination);
  o.type=type; o.frequency.value=freq;
  g.gain.setValueAtTime(0,ac.currentTime+delay);
  g.gain.linearRampToValueAtTime(vol,ac.currentTime+delay+0.01);
  g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+delay+dur);
  o.start(ac.currentTime+delay); o.stop(ac.currentTime+delay+dur+0.05);
}

function launchConfetti(count=120){
  const c=document.getElementById('confetti-canvas');
  if(!c) return;
  c.width=window.innerWidth; c.height=window.innerHeight;
  const ctx=c.getContext('2d');
  const parts=Array.from({length:count},()=>({
    x:Math.random()*c.width, y:-20,
    r:4+Math.random()*8, vx:(Math.random()-0.5)*6,
    vy:2+Math.random()*5, rot:Math.random()*360,
    vrot:(Math.random()-0.5)*8,
    col:['#06B6D4','#FACC15','#F97316','#84CC16','#A855F7','#EF4444','#10B981'][Math.floor(Math.random()*7)],
    alpha:1
  }));
  let frame=0;
  function draw(){
    ctx.clearRect(0,0,c.width,c.height);
    parts.forEach(p=>{
      p.x+=p.vx; p.y+=p.vy; p.rot+=p.vrot; p.vy+=0.1;
      if(p.y>c.height) p.alpha=Math.max(0,p.alpha-0.05);
      ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot*Math.PI/180);
      ctx.fillStyle=p.col; ctx.globalAlpha=p.alpha;
      ctx.fillRect(-p.r/2,-p.r/2,p.r,p.r);
      ctx.restore();
    });
    if(parts.some(p=>p.alpha>0) && frame++<300) requestAnimationFrame(draw);
    else ctx.clearRect(0,0,c.width,c.height);
  }
  draw();
}

function addPlayer(){
  playClick();
  const div=$id('player-inputs');
  const count=div.querySelectorAll('input').length;
  if(count>=6) return;
  const i=count+1;
  const row=document.createElement('div');
  row.style.marginBottom='12px';
  row.innerHTML=`<label style="display:block;font-weight:700;margin-bottom:6px;font-size:0.9rem;color:var(--gray)">Player ${i}</label><input class="inp" id="p${i}" placeholder="Guardian ${i} name" maxlength="20"/>`;
  div.appendChild(row);
  $id('rem-btn').style.display=count>=2?'':'none';
  if(count>=5) $id('add-btn').style.display='none';
}
function removePlayer(){
  playClick();
  const div=$id('player-inputs');
  const inputs=div.querySelectorAll('div');
  if(inputs.length<=2) return;
  div.removeChild(inputs[inputs.length-1]);
  $id('add-btn').style.display='';
  if(div.querySelectorAll('input').length<=2) $id('rem-btn').style.display='none';
}
function startGame(){
  playClick();
  const players=[];
  const inputs=$id('player-inputs').querySelectorAll('input');
  inputs.forEach(inp=>{ if(inp.value.trim()) players.push(inp.value.trim()); });
  if(players.length<2){ alert('Please enter at least 2 player names!'); return; }
  const tname=$id('team-name').value.trim();
  if(!tname){ alert('Please enter a team name!'); return; }
  G.players=players; G.teamName=tname;
  G.scores=Object.fromEntries(players.map(p=>[p,0]));
  G.totalScore=0; G.outbreakMeter=45; G.levelIdx=0;
  G.globalStartTime=Date.now(); G.levelScores=[0,0,0,0]; G.bossLevelScore=0;
  showLevelIntro(0);
}

function selectMC(i){
  playClick();
  // Deselect all
  LEVELS[G.levelIdx].challenges[G.challengeIdx].opts.forEach((_,j)=>{
    const el=$id(`opt-${j}`);
    if(el) el.className='opt';
  });
  $id(`opt-${i}`).className='opt selected';
  G.selectedOpts=[i];
  $id('confirm-area').style.display='block';
}

function toggleSA(i){
  playClick();
  const el=$id(`co-${i}`), ck=$id(`ck-${i}`);
  if(G.pickedOpts.includes(i)){
    G.pickedOpts=G.pickedOpts.filter(x=>x!==i);
    el.className='check-opt'; ck.style.display='none';
  } else {
    G.pickedOpts.push(i);
    el.className='check-opt picked'; ck.style.display='';
  }
}

function confirmMC(lvIdx,chIdx){
  if(G.selectedOpts.length===0) return;
  playClick();
  const lv=LEVELS[lvIdx], ch=lv.challenges[chIdx];
  const chosen=G.selectedOpts[0];
  const correct=chosen===ch.correct;
  const elapsed=(Date.now()-G.challengeStartTime)/1000;
  const speedBonus=correct?Math.max(0,Math.round(50*(1-elapsed/30))):0;
  const pts=correct?ch.points+speedBonus:0;

  // Reveal
  ch.opts.forEach((_,j)=>{
    const el=$id(`opt-${j}`);
    if(!el) return;
    el.disabled=true;
    if(j===ch.correct) el.className='opt correct';
    else if(j===chosen && !correct) el.className='opt wrong';
  });
  $id('confirm-area').style.display='none';

  if(correct){ playCorrect(); G.totalScore+=pts; G.levelScores[lvIdx]=(G.levelScores[lvIdx]||0)+pts; G.outbreakMeter=Math.max(0,G.outbreakMeter-12); }
  else{ playWrong(); G.outbreakMeter=Math.min(100,G.outbreakMeter+18); }

  setTimeout(()=>showFeedback(lvIdx,chIdx,correct,pts,ch.explanation),1200);
}

function confirmSA(lvIdx,chIdx){
  playClick();
  const lv=LEVELS[lvIdx], ch=lv.challenges[chIdx];
  const correctSet=ch.opts.map((o,i)=>o.correct?i:-1).filter(i=>i>=0);
  const picked=G.pickedOpts;
  const allCorrect=correctSet.every(i=>picked.includes(i)) && picked.every(i=>correctSet.includes(i));
  const someCorrect=correctSet.some(i=>picked.includes(i));
  const elapsed=(Date.now()-G.challengeStartTime)/1000;
  const speedBonus=allCorrect?Math.max(0,Math.round(50*(1-elapsed/40))):0;
  const pts=allCorrect?ch.points+speedBonus:someCorrect?Math.round(ch.points*0.5):0;

  // Reveal
  ch.opts.forEach((o,i)=>{
    const el=$id(`co-${i}`), ck=$id(`ck-${i}`);
    if(!el) return;
    el.onclick=null;
    if(o.correct){ el.className='check-opt reveal-good'; ck.style.display=''; ck.textContent='✓'; }
    else if(picked.includes(i)){ el.className='check-opt reveal-bad'; ck.style.display=''; ck.textContent='✗'; }
  });

  if(allCorrect){ playCorrect(); G.totalScore+=pts; G.levelScores[lvIdx]=(G.levelScores[lvIdx]||0)+pts; G.outbreakMeter=Math.max(0,G.outbreakMeter-14); }
  else if(someCorrect){ G.totalScore+=pts; G.levelScores[lvIdx]=(G.levelScores[lvIdx]||0)+pts; G.outbreakMeter=Math.min(100,G.outbreakMeter+8); }
  else{ playWrong(); G.outbreakMeter=Math.min(100,G.outbreakMeter+18); }

  setTimeout(()=>showFeedback(lvIdx,chIdx,allCorrect,pts,ch.explanation,someCorrect&&!allCorrect),1200);
}

          <p style="font-size:1.1rem;font-weight:800;line-height:1.6">${q.q}</p>
        </div>

        <!-- Options -->
        <div id="boss-opts">
          ${q.opts.map((o,i)=>`<button class="opt" id="bopt-${i}" onclick="selectBossOpt(${i})">${['🅐','🅑','🅒','🅓'][i]} ${o}</button>`).join('')}
        </div>
        <div id="boss-confirm" style="margin-top:12px;display:none">
          <button class="btn btn-red" style="width:100%;background:var(--red)" onclick="confirmBoss()">🚨 TEAM CONFIRMS →</button>
        </div>
        <div id="boss-feedback" style="margin-top:12px;display:none"></div>
      </div>
    </div>
  </div>`);

  // Boss timer countdown
  clearInterval(G.bossTimerHandle);
  G.bossTimerHandle=setInterval(()=>{
    G.bossTimer--;
    playTick();
    const n=$id('boss-num'), r=$id('boss-ring');
    if(n) n.textContent=Math.max(0,G.bossTimer);
    if(r){
      const pct=(Math.max(0,G.bossTimer)/15)*100;
      r.style.background=`conic-gradient(var(--red) ${pct}%,rgba(255,255,255,0.1) 0%)`;
    }
    if(G.bossTimer<=0){
      clearInterval(G.bossTimerHandle);
      if(!G.confirmed) autoFailBoss();
    }
  },1000);
}

function selectBossOpt(i){
  if(G.confirmed) return;
  playClick();
  BOSS_QS[G.bossIdx].opts.forEach((_,j)=>{
    const el=$id(`bopt-${j}`);
    if(el) el.className='opt';
  });
  $id(`bopt-${i}`).className='opt selected';
  G.selectedOpts=[i];
  $id('boss-confirm').style.display='block';
}

function autoFailBoss(){
  G.confirmed=true;
  clearInterval(G.bossTimerHandle);
  const q=BOSS_QS[G.bossIdx];
  revealBossAnswer(-1, q.correct, false);
}

function confirmBoss(){
  if(G.confirmed||G.selectedOpts.length===0) return;
  G.confirmed=true;
  clearInterval(G.bossTimerHandle);
  playClick();
  const q=BOSS_QS[G.bossIdx];
  const chosen=G.selectedOpts[0];
  const correct=chosen===q.correct;
  if(correct){ playCorrect(); G.bossScore+=100; G.totalScore+=100; G.outbreakMeter=Math.max(0,G.outbreakMeter-10); }
  else{ playWrong(); G.outbreakMeter=Math.min(100,G.outbreakMeter+12); }
  revealBossAnswer(chosen,q.correct,correct);
}

function revealBossAnswer(chosen,correctIdx,correct){
  BOSS_QS[G.bossIdx].opts.forEach((_,j)=>{
    const el=$id(`bopt-${j}`);
    if(!el) return;
    el.disabled=true;
    if(j===correctIdx) el.className='opt correct';
    else if(j===chosen) el.className='opt wrong';
  });
  $id('boss-confirm').style.display='none';
  const fb=$id('boss-feedback');
  if(fb){
    fb.style.display='block';
    fb.innerHTML=`<div style="background:${correct?'rgba(132,204,22,0.1)':'rgba(239,68,68,0.1)'};border:1px solid ${correct?'var(--lime)':'var(--red)'};border-radius:12px;padding:14px;margin-bottom:12px">
      <div style="font-weight:800;color:${correct?'var(--lime)':'var(--red)'};margin-bottom:6px">${correct?'✅ CORRECT! +100 pts':'❌ WRONG!'}</div>
      <div style="font-size:0.9rem;line-height:1.6">${BOSS_QS[G.bossIdx].fact}</div>
    </div>
    <button class="btn btn-cyan" style="width:100%" onclick="nextBossQ()">→ NEXT</button>`;
  }
}

function nextBossQ(){
  playClick();
  G.bossIdx++;
  G.confirmed=false;
  G.selectedOpts=[];
  showBossQ();
}

async function fetchLeaderboard(){
  try{
    const res=await fetch('/api/leaderboard');
    if(!res.ok) throw new Error();
    return await res.json();
  }catch(e){
    // Fallback: try localStorage
    try{
      const local=JSON.parse(localStorage.getItem('gg_lb')||'[]');
      return local.sort((a,b)=>b.score-a.score).slice(0,10);
    }catch{return [];}
  }
}

async function submitScore(teamName,score,players){
  const entry={teamName,score,players,date:new Date().toLocaleDateString()};
  try{
    await fetch('/api/submit-score',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(entry)
    });
  }catch(e){}
  // Always save to localStorage as backup
  try{
    const local=JSON.parse(localStorage.getItem('gg_lb')||'[]');
    local.push(entry);
    local.sort((a,b)=>b.score-a.score);
    localStorage.setItem('gg_lb',JSON.stringify(local.slice(0,50)));
  }catch(e){}
}

  const podiumClasses=['gold','silver','bronze'];

  // Podium
  const podium=$id('lb-podium');
  if(podium){
    if(!scores||scores.length===0){
      podium.innerHTML='<div style="color:var(--gray);padding:20px">No scores yet — be the first! 🎮</div>';
    } else {
      const top=scores.slice(0,3);
      podium.innerHTML=`
        <div class="ff" style="color:var(--yellow);font-size:1.1rem;margin-bottom:16px">⭐ TOP GUARDIANS</div>
        <div style="display:flex;justify-content:center;gap:12px;flex-wrap:wrap">
          ${top.map((s,i)=>`
          <div style="background:${i===0?'rgba(250,204,21,0.1)':i===1?'rgba(148,163,184,0.08)':'rgba(249,115,22,0.08)'};border:2px solid ${i===0?'var(--yellow)':i===1?'#94A3B8':'var(--coral)'};border-radius:16px;padding:20px;min-width:150px">
            <div style="font-size:2rem">${medals[i]||'🏅'}</div>
            <div style="font-weight:900;margin:4px 0;font-size:0.95rem">${s.teamName}</div>
            <div class="mono" style="color:var(--yellow);font-size:1.1rem">${(+s.score).toLocaleString()}</div>
            <div style="font-size:0.75rem;color:var(--gray)">${s.date||''}</div>
          </div>`).join('')}
        </div>`;
    }
  }

  // Full list
  const list=$id('lb-list');
  if(list){
    if(!scores||scores.length===0){
      list.innerHTML='<div style="color:var(--gray);text-align:center;padding:20px">Play a game to see your team here! 🎮</div>';
    } else {
      list.innerHTML=scores.map((s,i)=>`
      <div class="lb-row ${podiumClasses[i]||''}">
        <div style="font-size:${i<3?'1.5rem':'1rem'};text-align:center">${medals[i]||`#${i+1}`}</div>
        <div>
          <div style="font-weight:800">${s.teamName}</div>
          <div style="font-size:0.78rem;color:var(--gray)">${Array.isArray(s.players)?s.players.join(', '):'—'}</div>
        </div>
        <div class="mono" style="color:var(--yellow);font-size:1.05rem;text-align:right">${(+s.score).toLocaleString()}</div>
        <div style="font-size:0.78rem;color:var(--gray);text-align:right">${s.date||''}</div>
      </div>`).join('');
    }
  }
}

function refreshLB(){ playClick(); loadLB(); }
function toggleSound(){ G.soundOn=!G.soundOn; if(!G.soundOn && AC){ AC.close(); AC=null; } }

    '🦠 Bacteria are LIVING organisms — antibiotics can kill them!',
    '🔴 Viruses hijack your cells — antibiotics do NOT work on viruses!',
    '🍄 Fungi thrive in warm damp places — keep skin dry!',
    '🦟 Parasites steal nutrients — Plasmodium causes malaria via mosquito bites!',
    '🧼 #1 Universal Prevention: Wash hands with soap for 20 seconds!',
    '💊 Antibiotics: ONLY for bacteria. Never for viruses, fungi, or parasites!',
    '💉 Annual flu vaccine = best protection against influenza!',
    '👟 Wear shoes in locker rooms to prevent athlete\'s foot!',
    '🚰 Drink clean/filtered water to prevent parasitic infections!',
    '🏠 Stay home when sick — prevent community spread!'
  ];
  const tw=document.createElement('div');
  tw.style.cssText='position:fixed;bottom:0;left:0;right:0;z-index:100;pointer-events:none';
  tw.innerHTML=`<div class="ticker-wrap"><div class="ticker-inner">${facts.map(f=>`<span style="margin-right:80px;font-size:0.82rem;color:rgba(248,250,252,0.7)">${f}</span>`).join('')}${facts.map(f=>`<span style="margin-right:80px;font-size:0.82rem;color:rgba(248,250,252,0.7)">${f}</span>`).join('')}</div></div>`;
  document.body.appendChild(tw);
}

addTicker();
showWelcome();

// Update HUD timer every second
setInterval(()=>{
  const el=document.querySelector('.hud-time');
  if(el && G.globalStartTime){
    const elapsed=Math.floor((Date.now()-G.globalStartTime)/1000);
    const m=Math.floor(elapsed/60), s=elapsed%60;
    el.textContent=`⏱ ${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  }
},1000);
</script>
