<!DOCTYPE html>
<html lang="en">

<meta charset="UTF-8"/>

<title>Germ Guardians: Outbreak Defenders</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com"></script>
<style>
:root{--bg:#06080F;--cyan:#00E5FF;--cyan2:#00B4CC;--yellow:#FFD60A;--coral:#FF6B47;--lime:#69FF47;--red:#FF3B5B;--purple:#C77DFF;--green:#00E676;--orange:#FF9100;--white:#EEF5FF;--gray:#607D8B}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100vh;overflow-x:hidden}
body{background:var(--bg);font-family:'Nunito',sans-serif;color:var(--white)}
body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(rgba(0,229,255,0.08) 1px,transparent 1px);background-size:30px 30px;pointer-events:none;z-index:0}
body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 18% 18%,rgba(0,229,255,0.1) 0%,transparent 45%),radial-gradient(ellipse at 82% 82%,rgba(199,125,255,0.1) 0%,transparent 45%);pointer-events:none;z-index:0;transition:all .6s}
body.t-bac::after{background:radial-gradient(ellipse at 20% 20%,rgba(16,185,129,0.18) 0%,transparent 50%),radial-gradient(ellipse at 80% 80%,rgba(5,150,105,0.12) 0%,transparent 48%)}
body.t-vir::after{background:radial-gradient(ellipse at 20% 20%,rgba(239,68,68,0.18) 0%,transparent 50%),radial-gradient(ellipse at 80% 80%,rgba(220,38,38,0.12) 0%,transparent 48%)}
body.t-fun::after{background:radial-gradient(ellipse at 20% 20%,rgba(168,85,247,0.18) 0%,transparent 50%),radial-gradient(ellipse at 80% 80%,rgba(139,92,246,0.12) 0%,transparent 48%)}
body.t-pro::after{background:radial-gradient(ellipse at 20% 20%,rgba(249,115,22,0.18) 0%,transparent 50%),radial-gradient(ellipse at 80% 80%,rgba(234,88,12,0.12) 0%,transparent 48%)}
body.t-boss::after{background:radial-gradient(ellipse at 50% 50%,rgba(255,59,91,0.16) 0%,transparent 55%)}
.ff{font-family:'Fredoka One',cursive}
.mono{font-family:'Space Mono',monospace}
#app{position:relative;z-index:1;min-height:100vh}
.glass{background:rgba(7,12,32,0.88);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.08);border-radius:22px}
.glass-hi{background:rgba(0,229,255,0.04);backdrop-filter:blur(18px);border:1px solid rgba(0,229,255,0.2);border-radius:18px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:13px 26px;border-radius:14px;font-weight:800;font-size:.97rem;cursor:pointer;border:none;transition:all .18s;font-family:'Nunito',sans-serif;position:relative;overflow:hidden}
.btn:active{transform:scale(.95)!important}
.btn-cy{background:linear-gradient(135deg,var(--cyan2),var(--cyan));color:#001620;box-shadow:0 0 24px rgba(0,229,255,.3)}
.btn-cy:hover{box-shadow:0 0 40px rgba(0,229,255,.5);transform:translateY(-3px)}
.btn-ye{background:linear-gradient(135deg,#C8A000,var(--yellow));color:#160c00;box-shadow:0 0 24px rgba(255,214,10,.3)}
.btn-ye:hover{box-shadow:0 0 40px rgba(255,214,10,.5);transform:translateY(-3px)}
.btn-li{background:linear-gradient(135deg,#3AA814,var(--lime));color:#071000;box-shadow:0 0 24px rgba(105,255,71,.3)}
.btn-li:hover{box-shadow:0 0 40px rgba(105,255,71,.5);transform:translateY(-3px)}
.btn-re{background:linear-gradient(135deg,#C01030,var(--red));color:#fff;box-shadow:0 0 24px rgba(255,59,91,.3)}
.btn-re:hover{box-shadow:0 0 40px rgba(255,59,91,.5);transform:translateY(-3px)}
.btn-gh{background:rgba(255,255,255,.06);color:var(--white);border:1px solid rgba(255,255,255,.14)}
.btn-gh:hover{background:rgba(255,255,255,.12);transform:translateY(-2px)}
.btn-lg{padding:17px 38px;font-size:1.1rem;border-radius:18px}
.btn-sm{padding:9px 18px;font-size:.87rem;border-radius:10px}
.opt{width:100%;text-align:left;padding:14px 18px;border-radius:13px;border:2px solid rgba(255,255,255,.1);background:rgba(255,255,255,.03);color:var(--white);font-family:'Nunito',sans-serif;font-weight:700;font-size:.95rem;cursor:pointer;transition:all .17s;margin-bottom:9px;line-height:1.5}
.opt:hover{border-color:var(--cyan);background:rgba(0,229,255,.07);transform:translateX(5px)}
.opt.sel{border-color:var(--cyan);background:rgba(0,229,255,.1)}
.opt.cor{border-color:var(--lime)!important;background:rgba(105,255,71,.1)!important;color:var(--lime)!important}
.opt.wrg{border-color:var(--red)!important;background:rgba(255,59,91,.1)!important;color:var(--red)!important;animation:shake .4s}
.opt:disabled{cursor:not-allowed}
.tf-wrap{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.tf-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:28px 16px;border-radius:20px;border:2px solid rgba(255,255,255,.1);background:rgba(255,255,255,.03);color:var(--white);font-family:'Nunito',sans-serif;cursor:pointer;transition:all .2s;min-height:160px;width:100%;font-weight:800;font-size:1rem}
.tf-btn:hover{transform:translateY(-6px) scale(1.04);border-color:rgba(255,255,255,.3);box-shadow:0 16px 40px rgba(0,0,0,.4)}
.tf-btn.sel-t{border-color:var(--lime);background:rgba(105,255,71,.1);box-shadow:0 0 30px rgba(105,255,71,.2)}
.tf-btn.sel-f{border-color:var(--red);background:rgba(255,59,91,.1);box-shadow:0 0 30px rgba(255,59,91,.2)}
.tf-btn.rv-cor{border-color:var(--lime)!important;background:rgba(105,255,71,.15)!important;color:var(--lime)!important}
.tf-btn.rv-wrg{border-color:var(--red)!important;background:rgba(255,59,91,.15)!important;color:var(--red)!important;animation:shake .4s}
.tf-btn.rv-neu{border-color:var(--lime)!important;background:rgba(105,255,71,.06)!important;opacity:.7}
.tf-btn:disabled{cursor:not-allowed}
.co{display:flex;align-items:center;gap:13px;padding:13px 17px;border-radius:12px;border:2px solid rgba(255,255,255,.1);background:rgba(255,255,255,.03);cursor:pointer;transition:all .17s;margin-bottom:8px;font-weight:700;font-size:.93rem}
.co:hover{border-color:var(--cyan);background:rgba(0,229,255,.06);transform:translateX(4px)}
.co.pk{border-color:var(--cyan);background:rgba(0,229,255,.08)}
.co.rv-g{border-color:var(--lime)!important;background:rgba(105,255,71,.08)!important;color:var(--lime)!important}
.co.rv-b{border-color:var(--red)!important;background:rgba(255,59,91,.08)!important;color:var(--red)!important}
.cb{width:24px;height:24px;border-radius:6px;border:2px solid rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .17s}
.co.pk .cb{background:var(--cyan);border-color:var(--cyan)}
.co.rv-g .cb{background:var(--lime);border-color:var(--lime)}
.co.rv-b .cb{background:var(--red);border-color:var(--red)}
.meter-bar{height:18px;border-radius:9px;background:rgba(255,255,255,.08);overflow:hidden;position:relative}
.meter-fill{height:100%;border-radius:9px;transition:width .7s cubic-bezier(.34,1.56,.64,1);background:linear-gradient(90deg,#00E676 0%,#FFD60A 50%,#FF3B5B 100%)}
.meter-fill::after{content:'';position:absolute;inset:0;background:linear-gradient(0deg,transparent 50%,rgba(255,255,255,.18) 100%)}
.badge{display:inline-flex;align-items:center;gap:5px;padding:4px 13px;border-radius:99px;font-size:.78rem;font-weight:800}
.b-cy{background:rgba(0,229,255,.12);color:var(--cyan);border:1px solid rgba(0,229,255,.3)}
.b-ye{background:rgba(255,214,10,.12);color:var(--yellow);border:1px solid rgba(255,214,10,.3)}
.b-li{background:rgba(105,255,71,.12);color:var(--lime);border:1px solid rgba(105,255,71,.3)}
.b-re{background:rgba(255,59,91,.12);color:var(--red);border:1px solid rgba(255,59,91,.3)}
.b-pu{background:rgba(199,125,255,.12);color:var(--purple);border:1px solid rgba(199,125,255,.3)}
.b-or{background:rgba(255,145,0,.12);color:var(--orange);border:1px solid rgba(255,145,0,.3)}
.inp{width:100%;padding:13px 17px;border-radius:12px;background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.12);color:var(--white);font-family:'Nunito',sans-serif;font-weight:700;font-size:.97rem;outline:none;transition:all .2s}
.inp:focus{border-color:var(--cyan);background:rgba(0,229,255,.06)}
.inp::placeholder{color:var(--gray)}
.lb-row{display:grid;grid-template-columns:44px 1fr auto auto;align-items:center;gap:10px;padding:13px 18px;border-radius:13px;border:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.02);margin-bottom:7px;transition:all .2s}
.lb-row:hover{background:rgba(0,229,255,.04);border-color:rgba(0,229,255,.15)}
.lb-row.gld{background:rgba(255,214,10,.07);border-color:rgba(255,214,10,.28)}
.lb-row.slv{background:rgba(180,190,200,.06);border-color:rgba(180,190,200,.25)}
.lb-row.brz{background:rgba(255,107,71,.07);border-color:rgba(255,107,71,.28)}
.cert{border:3px solid var(--yellow);background:linear-gradient(135deg,rgba(255,214,10,.05),rgba(0,229,255,.05));border-radius:20px;padding:30px;position:relative}
.cert::before{content:'⭐ ⭐ ⭐';position:absolute;top:12px;right:16px;color:rgba(255,214,10,.2);font-size:1.3rem;letter-spacing:7px}
.ticker-wrap{overflow:hidden;white-space:nowrap;background:rgba(0,229,255,.04);border-top:1px solid rgba(0,229,255,.12);border-bottom:1px solid rgba(0,229,255,.12);padding:7px 0}
.ticker-inner{display:inline-flex;animation:ticker 40s linear infinite}
.streak{display:flex;align-items:center;gap:5px;background:rgba(255,145,0,.12);border:1px solid rgba(255,145,0,.4);border-radius:10px;padding:5px 12px;animation:sglow 2s ease-in-out infinite}
@keyframes sglow{0%,100%{box-shadow:0 0 8px rgba(255,145,0,.2)}50%{box-shadow:0 0 22px rgba(255,145,0,.5)}}
@keyframes float{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-18px) rotate(3deg)}}
@keyframes floatB{0%,100%{transform:translateY(0) rotate(2deg)}50%{transform:translateY(-14px) rotate(-4deg)}}
@keyframes pop-in{0%{transform:scale(0) rotate(-12deg);opacity:0}75%{transform:scale(1.07) rotate(2deg)}100%{transform:scale(1) rotate(0);opacity:1}}
@keyframes slide-up{from{transform:translateY(28px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-9px)}40%{transform:translateX(9px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
@keyframes ticker{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
@keyframes mgpop{from{transform:scale(0) rotate(-20deg);opacity:0}to{transform:scale(1) rotate(0);opacity:1}}
@keyframes zap{0%{transform:scale(1);opacity:1}50%{transform:scale(1.8);opacity:.5}100%{transform:scale(0);opacity:0}}
.fa{animation:float 3.2s ease-in-out infinite}
.fb{animation:floatB 2.8s ease-in-out infinite .4s}
.fc{animation:float 3.6s ease-in-out infinite .8s}
.fd{animation:floatB 3s ease-in-out infinite 1.2s}
.pi{animation:pop-in .5s cubic-bezier(.34,1.56,.64,1) forwards}
.su{animation:slide-up .4s ease-out forwards}
#cc{position:fixed;inset:0;pointer-events:none;z-index:9999}
#mgo{display:none;position:fixed;inset:0;z-index:500;background:rgba(4,6,14,.98);overflow-y:auto}
@media(max-width:640px){.btn-lg{padding:14px 22px;font-size:1rem}.tf-wrap{grid-template-columns:1fr}}
</style>
</head>

 facts:['💡 Your body has ~38 TRILLION bacteria cells — outnumbering your own cells! Most are beneficial gut bacteria that digest food and train your immune system.','💡 Bacteria reproduce by splitting in two (binary fission). Under ideal conditions, one E. coli becomes 16 MILLION in just 8 hours!','💡 Before penicillin was discovered in 1928 (by accident — mold was killing a bacteria culture!), simple bacterial infections could be fatal.','💡 Some bacteria form armored "spores" — tiny seeds surviving extreme heat, cold, and drought for DECADES in soil, waiting for a suitable host.'],
 qpool:[
  {type:'mc',pts:150,badge:'🔬 IDENTIFY',q:'What TYPE of organism is Streptococcus pyogenes — the pathogen behind this outbreak?',
   opts:['Virus — nonliving genetic material inside a protein shell','Bacteria — single-celled, living, prokaryotic organism ✓','Fungi — eukaryotic, reproduces via spores in damp places','Protist — eukaryotic single cell, often spread by insect vectors'],
   cor:1,exp:'✅ Bacteria are single-celled LIVING organisms classified as PROKARYOTIC — their DNA floats freely in the cytoplasm with NO enclosed nucleus. Unlike viruses (nonliving/acellular) or fungi/protists (eukaryotic), bacteria have their own full cellular machinery to eat, grow, and reproduce independently. They also release toxins that damage your tissue!'},
  {type:'mc',pts:150,badge:'🔬 CELL BIOLOGY',q:'Bacteria come in three main shapes. Which word describes sphere-shaped bacteria like Streptococcus?',
   opts:['Bacilli — rod-shaped, like tiny sausages','Spirilla — spiral-shaped, like curly pasta','Cocci — sphere-shaped, like tiny balls ✓','Capsid — the protein coat of a virus (NOT a bacterial shape!)'],
   cor:2,exp:'✅ Bacteria\'s three shapes: COCCI (spheres), BACILLI (rods), and SPIRILLA (spirals). "Streptococcus" literally means "twisted chain of spheres!" Scientists use shapes as one key tool for identifying which bacteria cause an illness. Think of it as a bacterial ID badge!'},
  {type:'mc',pts:150,badge:'💊 TREATMENT',q:'Why is it CRITICAL to finish ALL your antibiotics — even when you feel totally better after a few days?',
   opts:['Antibiotics are vitamins that keep giving you energy','Leftover antibiotics can be saved for next time','Tougher bacteria that survived must be eliminated before they become resistant ✓','Antibiotics only activate their full effect after the complete course'],
   cor:2,exp:'🚨 ANTIBIOTIC RESISTANCE! If you stop early, the weakest bacteria die — but the TOUGHEST, most resistant ones survive and reproduce. Their offspring inherit that resistance. Soon those bacteria laugh at the medicine entirely! This is a global health crisis. Always complete the full prescription!'},
  {type:'tf',pts:100,badge:'⚡ TRUE OR FALSE',q:'"Antibiotics are an effective treatment for influenza (the flu) and other viral infections."',
   cor:false,exp:'❌ FALSE! Antibiotics ONLY work on bacteria — they target specific bacterial cell structures that viruses simply don\'t have. Giving antibiotics for a viral infection has zero benefit but destroys helpful gut bacteria and dangerously contributes to antibiotic resistance!'},
  {type:'tf',pts:100,badge:'⚡ TRUE OR FALSE',q:'"Bacteria are prokaryotic — their genetic material (DNA) floats freely in the cell with no enclosing nucleus."',
   cor:true,exp:'✅ TRUE! "Prokaryotic" comes from Greek meaning "before nucleus." All bacterial DNA floats freely in cytoplasm. This contrasts sharply with eukaryotic organisms (fungi, protists, YOU!) where DNA is safely enclosed in a membrane-bound nucleus. Understanding this difference helps scientists design medicines that target only bacteria!'},
  {type:'tf',pts:100,badge:'⚡ TRUE OR FALSE',q:'"All bacteria are harmful pathogens that cause disease in humans."',
   cor:false,exp:'❌ FALSE! The VAST MAJORITY of bacteria are harmless or actively BENEFICIAL. Your gut hosts trillions of helpful bacteria producing vitamins, digesting food, and training your immune system. Bacteria also decompose dead matter and recycle nutrients throughout Earth\'s entire ecosystem. Only a tiny fraction cause human disease!'},
  {type:'sa',pts:200,badge:'🛡️ SELECT ALL CORRECT',q:'Select ALL correct prevention methods for strep throat and bacterial infections:',
   opts:[{t:'Wash hands with soap for at least 20 seconds',c:true},{t:'Take antibiotics daily as a preventative supplement',c:false},{t:'Cover coughs and sneezes with your elbow or tissue',c:true},{t:"Don't share drinks, food, or utensils with others",c:true},{t:'Stay home from school/work when you are sick',c:true},{t:'Use antiviral medicine to boost bacterial immunity',c:false}],
   exp:'✅ Hand washing (full 20 seconds!), covering coughs, not sharing, and staying home are your bacteria-busting tools. Daily antibiotics cause dangerous resistance. Antivirals target viruses — completely different pathogen, zero effect on bacteria!'},
  {type:'sa',pts:200,badge:'💊 SELECT ALL CORRECT',q:'Which statements about antibiotic treatment are 100% TRUE?',
   opts:[{t:'Antibiotics kill bacteria or stop them from reproducing',c:true},{t:'Stop antibiotics when symptoms disappear — that\'s enough',c:false},{t:'Completing the full prescription helps prevent resistance',c:true},{t:'Antibiotics are effective against viruses, fungi, and parasites too',c:false},{t:'Penicillin and amoxicillin are common antibiotic examples',c:true}],
   exp:'✅ Antibiotics specifically destroy bacteria or block their growth. ALWAYS finish the full course! They have ZERO effect on viruses, fungi, or protists — those organisms have entirely different biology needing completely different medicines!'}
 ]
},
{id:'vir',name:'Virus',emoji:'⚡',svgK:'vir',fc:'fb',tc:'t-vir',
 col:'#EF4444',cbg:'rgba(239,68,68,0.09)',cbr:'rgba(239,68,68,0.32)',
 typeDesc:'NONLIVING, acellular (no cells!) packets of DNA or RNA wrapped in a protein shell called a capsid. Must hijack living cells to replicate.',
 eg:'Influenza Virus → Seasonal Flu (fever, body aches, cough, extreme fatigue)',
 prev:['Annual flu vaccine — updated yearly for new strains 💉','Wash hands thoroughly and often','Avoid close contact with sick people','Cover coughs and sneezes','Disinfect high-touch surfaces','Stay home when sick'],
 treat:'Rest, fluids, fever reducers to support your immune system. Antiviral medicine (e.g., Tamiflu) if started within 48 hrs. NEVER antibiotics — they do nothing!',
 huddle:`🤝 <strong>Discuss as a team:</strong><br>• How is a virus DIFFERENT from bacteria? Does it have cells?<br>• What does "acellular" mean? What is a "capsid"?<br>• Why can't antibiotics kill viruses?<br>• How does the flu vaccine actually work in your body?`,
 scenarios:[
  {t:'🍽️ Cafeteria Flu Explosion',s:`⚡ VIRAL ALERT! Riverside Middle School's cafeteria is Ground Zero for a flu outbreak! Students who shared lunch tables are collapsing with <strong>fever, crushing body aches, exhaustion, and cough</strong>. The Influenza virus — a nonliving protein-wrapped packet of genetic material — hijacks cells and makes thousands of copies. School attendance has dropped 40% in three days!`},
  {t:'🏀 Tournament Hotel Disaster',s:`⚡ VIRAL ALERT! A State Basketball Tournament turned into a viral nightmare! Players from multiple schools who shared hotel floors are all reporting <strong>fevers, aching muscles, and debilitating fatigue</strong>. The Influenza virus spread through respiratory droplets during games and via shared surfaces like elevator buttons and door handles. Explain the science and recommend containment!`},
  {t:'🎄 Holiday Reunion Outbreak',s:`⚡ VIRAL ALERT! A holiday family reunion triggered a cluster flu outbreak! Relatives who traveled from different cities hugged, shook hands, and shared food — and now everyone is sick with <strong>fever, aches, headaches, and extreme tiredness</strong>. Influenza — the nonliving cellular hijacker — spread through sneezes and contaminated hands. Stop the spread!`}
 ],
 facts:['💡 Viruses are so tiny that 50 MILLION of them could fit on the period at the end of this sentence. They are nature\'s ultimate micro-machines!','💡 When a virus hijacks a cell, the cell can produce 100–1,000 new virus copies before it BURSTS open (lyses), releasing them all to infect new cells. Cellular warfare!','💡 Some viruses survive on hard surfaces (doorknobs, phones, keyboards) for up to 24 hours — waiting for someone to touch their eyes or nose!','💡 The flu virus MUTATES every year, slightly changing its protein coat so immune systems don\'t recognize last year\'s version. This is why we need a NEW vaccine annually!'],
 qpool:[
  {type:'mc',pts:150,badge:'🔬 CORE CONCEPT',q:'What makes a VIRUS fundamentally different from ALL other pathogen types?',
   opts:['Viruses are much larger and have their own complete metabolism','Viruses are nonliving — acellular (not made of cells), must hijack a host to replicate ✓','Viruses are living cells that are too tiny to have a nucleus','Viruses are the most complex pathogen, making them the hardest to study'],
   cor:1,exp:'✅ Viruses are ACELLULAR — not made of cells at all! They\'re simply genetic material (DNA or RNA) wrapped in a protein shell called a CAPSID. They cannot eat, breathe, grow, or reproduce on their own. They MUST invade a living cell and hijack it to copy themselves — making them uniquely unlike any living organism. Biological robots!'},
  {type:'mc',pts:150,badge:'🔬 HOW IT SPREADS',q:'How does the influenza virus most commonly spread from one person to another?',
   opts:['Mosquito bites carrying the virus directly into the bloodstream','Contaminated water sources like streams and unfiltered wells','Respiratory droplets from coughs/sneezes, and touching contaminated surfaces ✓','Skin-to-skin contact only — you must physically touch an infected person'],
   cor:2,exp:'✅ Influenza is a master traveler! Respiratory DROPLETS released during coughs or sneezes carry the virus through the air. The virus also survives on surfaces for hours — touch a contaminated doorknob, then touch your eyes or nose, and the virus gains entry. This is why covering coughs AND washing hands are both critical prevention tools!'},
  {type:'mc',pts:150,badge:'💊 TREATMENT',q:'A student has confirmed influenza. What is the CORRECT medical approach?',
   opts:['Prescribe a strong antibiotic course immediately','Antifungal cream since flu causes skin inflammation','Rest, fluids, fever reducers; antivirals (like Tamiflu) if caught within 48 hours ✓','Antibiotics + antivirals combined for maximum effect'],
   cor:2,exp:'✅ For flu (a VIRUS): support your immune system with rest, fluids, and fever reducers. Antiviral medicines like Tamiflu can reduce severity IF started within 48 hours — they block viral replication inside cells. Antibiotics do ZERO for viruses and worsen antibiotic resistance. Never use antibiotics for viral infections!'},
  {type:'tf',pts:100,badge:'⚡ TRUE OR FALSE',q:'"Viruses are classified as living organisms because they contain genetic material (DNA or RNA)."',
   cor:false,exp:'❌ FALSE! Having DNA or RNA doesn\'t qualify something as "living." Viruses are ACELLULAR — no cell membrane, no metabolism, no self-reproduction. Outside a host cell a virus is just an inert chemical package. It cannot do anything at all without hijacking a living cell. Most scientists firmly classify viruses as NONLIVING.'},
  {type:'tf',pts:100,badge:'⚡ TRUE OR FALSE',q:'"A virus can reproduce and make copies of itself without entering a host cell."',
   cor:false,exp:'❌ FALSE! A free-floating virus is completely helpless. It has no ribosomes, no energy systems, no cellular machinery. It MUST invade a living cell to do anything. Once inside, it hijacks the cell\'s ribosomes to produce copies — then those copies burst out to infect new cells. No host cell = a virus does absolutely nothing!'},
  {type:'tf',pts:100,badge:'⚡ TRUE OR FALSE',q:'"The influenza vaccine is updated every year because the flu virus mutates and changes its protein coat."',
   cor:true,exp:'✅ TRUE! The influenza virus undergoes "antigenic drift" — small mutations to its surface proteins each season. Your immune system learns to recognize last year\'s version, but the new variant looks different enough to slip past. Scientists monitor global flu strains each year and update the vaccine to match the predicted dominant strains. This is why annual vaccination matters!'},
  {type:'sa',pts:200,badge:'🛡️ SELECT ALL CORRECT',q:'Select ALL prevention methods that actually protect against the influenza virus:',
   opts:[{t:'Get the annual flu vaccine every year (updated for new strains!) 💉',c:true},{t:'Take antibiotics immediately when flu symptoms appear',c:false},{t:'Wash hands thoroughly and frequently with soap and water',c:true},{t:'Avoid close contact with people who are visibly sick',c:true},{t:'Cover coughs and sneezes with your elbow or a clean tissue',c:true},{t:'Stay home when sick to protect your community',c:true}],
   exp:'⚠️ TRAP! Antibiotics do ZERO against influenza. The vaccine (updated annually!), thorough hand washing, avoiding sick people, covering coughs, and staying home are your actual viral defense tools. Never reach for antibiotics for a viral illness!'},
  {type:'sa',pts:200,badge:'🔬 SELECT ALL CORRECT',q:'Which statements about viruses are scientifically accurate? Select ALL that apply:',
   opts:[{t:'Viruses are nonliving because they are acellular (not made of cells)',c:true},{t:'Viruses replicate by hijacking host cell machinery to make copies',c:true},{t:'Antibiotics effectively prevent and treat viral infections',c:false},{t:'The protein coat surrounding viral genetic material is called a capsid',c:true},{t:'Viruses can spread through respiratory droplets, surfaces, and insect bites',c:true}],
   exp:'✅ Viruses: nonliving, acellular, capsid-wrapped packets of DNA/RNA. They hijack cells and spread multiple ways. Antibiotics are 100% ineffective — they target bacterial structures that viruses simply don\'t possess!'}
 ]
},
{id:'fun',name:'Fungi',emoji:'🍄',svgK:'fun',fc:'fc',tc:'t-fun',
 col:'#A855F7',cbg:'rgba(168,85,247,0.09)',cbr:'rgba(168,85,247,0.32)',
 typeDesc:'EUKARYOTIC organisms with a tough chitin cell wall (same as crab shells!). Can be single-celled (yeast) or multi-celled (mold). Reproduce via spores in warm, damp places.',
 eg:"Trichophyton → Ringworm / Athlete's Foot (itchy, circular ring-shaped rash on skin)",
 prev:['Keep skin clean and completely dry','Never share towels, combs, socks, or clothes','Wear shoes in public showers, pools, and locker rooms','Wash hands after touching animals or soil'],
 treat:'Antifungal medicines — creams like clotrimazole for skin infections, or oral pills for severe cases. They work by breaking down the chitin cell wall!',
 huddle:`🤝 <strong>Discuss as a team:</strong><br>• How are fungi different from bacteria AND viruses?<br>• What does "eukaryotic" mean? (Hint: it\'s more similar to YOUR cells!)<br>• What makes a locker room the perfect fungal breeding ground?<br>• Why can't antibiotics or antivirals treat fungal infections?`,
 scenarios:[
  {t:'⚽ Soccer Locker Room Nightmare',s:`🍄 FUNGAL ALERT! Half the school soccer team has <strong>itchy, ring-shaped rashes</strong> on their skin and feet! The warm, humid locker room is a perfect breeding ground for <strong>Trichophyton</strong> — an eukaryotic fungus spreading via microscopic spores. It's spreading through shared towels and the damp shower floor. Despite the name "ringworm," there is NO actual worm — it's 100% fungal!`},
  {t:'🏊 Community Pool Rash Outbreak',s:`🍄 FUNGAL ALERT! The Riverside Community Pool is dealing with a growing rash outbreak. Swimmers are developing <strong>itchy, scaly patches between toes</strong> and circular red rashes on arms. The culprit: <strong>Trichophyton</strong> fungal spores flourishing on the warm, wet pool deck and changing rooms. Forty people are infected and more are calling in daily!`},
  {t:'🤼 Wrestling Tournament Skin Crisis',s:`🍄 FUNGAL ALERT! The Regional Wrestling Invitational has been rocked by a rash outbreak! Athletes from multiple schools are showing <strong>circular, itchy skin lesions</strong> after the tournament. Direct skin-to-skin contact during wrestling created perfect conditions for <strong>Trichophyton</strong> spores to jump between competitors. Health officials need your analysis!`}
 ],
 facts:['💡 Fungi are more closely related to ANIMALS than to plants! Both are heterotrophs (can\'t make their own food). The chitin in fungal cell walls is the SAME material in crab and insect shells! 🦀','💡 Fungi are Earth\'s essential decomposers — without them, dead leaves and trees would pile up forever. They break down organic matter and recycle nutrients into soil that plants need!','💡 A single giant puffball mushroom can release 7 TRILLION spores in one season. Most are harmless, but pathogenic spores (like Histoplasma) can cause serious lung infections when inhaled!','💡 Athlete\'s Foot gets its name because athletes frequently walk barefoot in public showers. The fungi literally eat dead skin cells on your foot — that\'s what causes the itching and stinging!'],
 qpool:[
  {type:'mc',pts:150,badge:'🔬 IDENTIFY',q:"What type of organism is Trichophyton, which causes ringworm and athlete's foot?",
   opts:['Bacteria — prokaryotic, single-celled, treated with antibiotics','Virus — nonliving, acellular, needs a host to replicate','Fungi — eukaryotic, chitin cell wall, reproduces via spores ✓','Protist — eukaryotic, often spread by insect vectors like mosquitoes'],
   cor:2,exp:'✅ Fungi are EUKARYOTIC organisms with a distinctive CHITIN cell wall — the same tough material in crab and insect shells! Unlike bacteria (prokaryotic, no nucleus) and viruses (nonliving), fungi are complex organisms with true nuclei that reproduce by releasing millions of microscopic spores. Trichophyton thrives on warm, damp skin surfaces!'},
  {type:'mc',pts:150,badge:'🔬 CELL WALL SCIENCE',q:'Antifungal medicines work by destroying what unique component found in fungal cell walls but NOT in human cells?',
   opts:['Cellulose — found in plant cell walls','Chitin — found in fungal walls, crabs, and insect shells ✓','Peptidoglycan — found in bacterial cell walls','Keratin — the protein in human hair and fingernails'],
   cor:1,exp:'✅ CHITIN is both the fungal superpower AND their vulnerability! Antifungal drugs specifically target chitin, breaking down the cell wall and killing the fungus. Human cells have no chitin at all, so antifungals don\'t harm us — brilliant specificity! This same principle explains why antibiotics (targeting bacterial walls) and antivirals (blocking viral replication) don\'t hurt human cells either.'},
  {type:'mc',pts:150,badge:'💊 TREATMENT',q:"A student has ringworm confirmed by a doctor. What's the CORRECT treatment approach?",
   opts:['Antibiotics (penicillin or amoxicillin) — they kill all types of germs','Antiviral medicine — should be started within 48 hours for best effect','Antifungal medicines — clotrimazole cream, or pills for severe cases ✓','Supportive care only — the immune system handles fungi without medicine'],
   cor:2,exp:'✅ Ringworm is FUNGAL — needs ANTIFUNGAL medicine! Clotrimazole cream attacks and destroys chitin in the fungal cell wall. Antibiotics target bacterial structures fungi don\'t have. Antivirals target viral replication mechanisms that don\'t exist in fungi. Every pathogen type has DIFFERENT biology requiring DIFFERENT medicine — match the medicine to the microbe!'},
  {type:'tf',pts:100,badge:'⚡ TRUE OR FALSE',q:'"Ringworm is caused by a parasitic worm that burrows under the skin and creates a ring-shaped track."',
   cor:false,exp:'❌ FALSE — one of medicine\'s greatest naming mistakes! "Ringworm" is 100% caused by FUNGI (Trichophyton species) — no worm involved whatsoever! The misleading name comes from the circular, ring-shaped rash the fungus creates as it grows outward. Early physicians saw the ring shape and mistakenly imagined a worm moving under the skin. Pure fungus. No worm. Ever!'},
  {type:'tf',pts:100,badge:'⚡ TRUE OR FALSE',q:'"Fungi reproduce by releasing tiny spores that can float through air, rest on damp surfaces, and infect new hosts."',
   cor:true,exp:'✅ TRUE! Fungi release millions of microscopic SPORES — lightweight "seeds" that drift through air, settle on damp surfaces, or hitch rides on skin. When conditions are right (warm, moist, dark), spores germinate and grow. This is exactly why fungi spread so easily through shared locker rooms, pool decks, and public shower areas!'},
  {type:'tf',pts:100,badge:'⚡ TRUE OR FALSE',q:'"Fungi are eukaryotic — meaning their cells have a defined nucleus that encloses their DNA, just like human cells."',
   cor:true,exp:'✅ TRUE! Fungi are EUKARYOTIC — their cells have a proper membrane-bound nucleus protecting their DNA. This makes them much more biologically similar to human cells than bacteria (prokaryotic) or viruses (not even cells!). This similarity also makes fungal infections trickier to treat, because medicines that harm fungi might potentially affect your similar cells too — which is why specific antifungals were developed!'},
  {type:'sa',pts:200,badge:'🛡️ SELECT ALL CORRECT',q:'Select ALL correct prevention strategies for fungal infections:',
   opts:[{t:'Keep skin thoroughly clean and completely dry',c:true},{t:'Take antibiotics as a precautionary measure in humid environments',c:false},{t:'Never share towels, combs, socks, or personal clothing',c:true},{t:'Wear shoes or sandals in public showers, pools, and locker rooms',c:true},{t:'Wash hands after touching animals or working with soil',c:true},{t:'Use insect repellent to block fungal spores in the air',c:false}],
   exp:'✅ Fungi love warmth and moisture — deprive them of it! Stay dry, protect feet in shared spaces, never share personal items, and wash after soil/animal contact. Antibiotics and insect repellent have zero effect on fungi — completely wrong mechanism for the wrong organism!'},
  {type:'sa',pts:200,badge:'🔬 SELECT ALL CORRECT',q:'Which facts about fungi are scientifically accurate?',
   opts:[{t:'Fungi are eukaryotic organisms with a true, membrane-bound nucleus',c:true},{t:'Fungal cell walls contain chitin — the same material in crab shells',c:true},{t:'Fungi are treated effectively with standard antibiotics',c:false},{t:'Fungi reproduce through the release of spores into the environment',c:true},{t:'Fungi thrive especially in warm, damp, dark environments',c:true}],
   exp:'✅ Fungi: eukaryotic, chitin-walled, spore-reproducing, moisture-loving organisms. Antibiotics are completely ineffective — they target bacterial cell wall structures (peptidoglycan), not fungal chitin. You always need the right medicine for the right organism!'}
 ]
},
{id:'pro',name:'Protist',emoji:'🦟',svgK:'pro',fc:'fd',tc:'t-pro',
 col:'#F97316',cbg:'rgba(249,115,22,0.09)',cbr:'rgba(249,115,22,0.32)',
 typeDesc:'EUKARYOTIC single-celled organisms (like your cells) that live inside a host and steal nutrients. Many are vector-borne — spread by insect bites.',
 eg:'Plasmodium (protozoan) → Malaria (recurring fever, chills, fatigue — spread by Anopheles mosquito bites)',
 prev:['Use insect repellent (DEET) and sleep under bed nets','Drink only clean, filtered, or boiled water','Remove standing water where mosquitoes breed','Wash produce and cook meat thoroughly'],
 treat:'Specific antiprotozoal medicines — e.g., artemisinin-based combination therapy (ACT) for malaria. Requires precise medicine for each specific protist species.',
 huddle:`🤝 <strong>Discuss as a team:</strong><br>• How are protists different from bacteria, viruses, AND fungi?<br>• What is a "vector" and why is the mosquito so effective as one?<br>• Why is malaria so good at hiding from the immune system?<br>• Why do protists require SPECIFIC antiprotozoal medicine?`,
 scenarios:[
  {t:'🌍 Tropical Field Trip Emergency',s:`🦟 PROTIST ALERT! Students just returned from a tropical field trip and several are collapsing with <strong>recurring fever, chills, and extreme fatigue</strong>! Health officials confirm infected Anopheles mosquitoes in the area were carrying <strong>Plasmodium</strong> — a protozoan protist that invades red blood cells and causes malaria. It's hiding INSIDE blood cells, evading the immune system. Act fast!`},
  {t:'🏕️ Jungle Expedition Outbreak',s:`🦟 PROTIST ALERT! A science expedition team returned from a rainforest survey with multiple members now exhibiting <strong>cyclical fevers, shaking chills, and severe fatigue</strong> that come and go every 48 hours. Doctors confirmed <strong>Plasmodium vivax</strong> — a protist hijacking red blood cells. The mosquito-borne pathogen traveled home with the team. Identify the pathogen type and recommend treatment!`},
  {t:'🌊 International Sports Exchange Crisis',s:`🦟 PROTIST ALERT! Athletes returning from an international sports exchange in a malaria-endemic region are now falling ill with <strong>high fevers, chills, and extreme exhaustion</strong>. Testing confirmed <strong>Plasmodium</strong> infection — a protist vector-delivered by Anopheles mosquito bites. Because it hides inside red blood cells, standard medicines won't work. Your team must recommend the RIGHT treatment!`}
 ],
 facts:['💡 Malaria kills over 600,000 people per year — mostly children under five in sub-Saharan Africa. It\'s one of the deadliest infectious diseases in all of human history!','💡 Plasmodium has a DOUBLE life cycle — living in BOTH mosquitoes AND humans at different stages. In the mosquito it reproduces sexually; in humans it reproduces asexually inside liver cells then red blood cells!','💡 Because protists are eukaryotic (like human cells), it\'s very hard to design medicine that kills them without harming the patient. This is why specific antiprotozoal drugs took decades to develop!','💡 Standing water as shallow as a BOTTLE CAP can be enough for a mosquito to lay eggs and hatch larvae. Eliminating standing water is one of the most powerful malaria-prevention tools available!'],
 qpool:[
  {type:'mc',pts:150,badge:'🔬 IDENTIFY',q:'Plasmodium causes malaria by invading red blood cells. What type of pathogen is it?',
   opts:['Bacteria — prokaryotic, treated with antibiotics','Virus — nonliving, acellular, needs host cells to replicate','Fungi — eukaryotic, reproduces via spores in damp environments','Protist — eukaryotic single-celled organism that lives inside a host ✓'],
   cor:3,exp:'✅ Protists are EUKARYOTIC single-celled organisms — meaning their cells have a proper nucleus, just like yours. Plasmodium is a protozoan protist that enters your body through a mosquito bite, multiplies in your liver, then invades and destroys red blood cells. Because protists are so similar to human cells biologically, they\'re much harder to treat than bacteria or viruses!'},
  {type:'mc',pts:150,badge:'🔬 VECTOR BIOLOGY',q:'Plasmodium uses the Anopheles mosquito as a "vector." What does "vector" mean in infectious disease science?',
   opts:['A medical device used to detect pathogens in blood samples','A living organism that carries and transmits a pathogen from one host to another ✓','The scientific word for any insect that lives near water sources','A type of medicine designed to neutralize mosquito-borne toxins'],
   cor:1,exp:'✅ A VECTOR is a living organism — usually an insect — that carries and delivers a pathogen from one person to another without getting sick itself. The Anopheles mosquito is the world\'s most famous (and deadly) vector: when it bites an infected person, it picks up Plasmodium, which then develops inside the mosquito before being injected into the next person it bites. The mosquito is nature\'s pathogen delivery drone!'},
  {type:'mc',pts:150,badge:'💊 TREATMENT',q:'What is the CORRECT treatment for malaria caused by Plasmodium?',
   opts:['Standard antibiotics — penicillin or amoxicillin, full course','Antifungal medicines targeting the chitin cell wall','Artemisinin-based combination therapy (ACT) — specific antiprotozoal drugs ✓','Supportive care only — rest and fluids while the immune system fights it'],
   cor:2,exp:'✅ Malaria requires SPECIFIC antiprotozoal medicine! Artemisinin-based combination therapy (ACT) is the WHO-recommended gold standard. These drugs interfere specifically with Plasmodium\'s ability to break down food inside red blood cells, destroying it from within. Antibiotics, antivirals, and antifungals target completely different biological mechanisms that protists don\'t have — they\'re useless against malaria!'},
  {type:'tf',pts:100,badge:'⚡ TRUE OR FALSE',q:'"Protists are prokaryotic organisms similar to bacteria — they lack a membrane-bound nucleus in their cells."',
   cor:false,exp:'❌ FALSE! Protists are EUKARYOTIC — they have a proper membrane-bound nucleus enclosing their DNA, exactly like your cells! This is actually what makes them so dangerous and difficult to treat. Because protists\' cell biology is so similar to human cells, it\'s hard to design medicines that destroy protists without accidentally harming patient\'s cells too. This is entirely unlike bacteria (prokaryotic) or viruses (not even cells)!'},
  {type:'tf',pts:100,badge:'⚡ TRUE OR FALSE',q:'"Malaria is spread from person to person through coughing, sneezing, or direct physical contact."',
   cor:false,exp:'❌ FALSE! Malaria is NOT contagious person-to-person. Plasmodium requires a specific VECTOR — the Anopheles mosquito — to transfer between humans. The mosquito bites an infected person, picks up Plasmodium in the blood, and then delivers it when biting the next person. You cannot "catch" malaria from being near or touching an infected person — you need the mosquito middleman!'},
  {type:'tf',pts:100,badge:'⚡ TRUE OR FALSE',q:'"Using insecticide-treated bed nets is an effective prevention strategy against vector-borne protist diseases like malaria."',
   cor:true,exp:'✅ TRUE! Bed nets treated with insecticide are one of the most cost-effective public health interventions ever developed for malaria prevention. They physically block mosquitoes from biting during the night (when Anopheles are most active) AND the insecticide kills mosquitoes that contact the net. The WHO credits insecticide-treated nets with saving millions of lives across sub-Saharan Africa!'},
  {type:'sa',pts:200,badge:'🛡️ SELECT ALL CORRECT',q:'Which prevention strategies correctly protect against protist diseases like malaria?',

function beep(f=440,d=.12,t='square',v=.16,delay=0){
 if(!G.soundOn)return;const ac=gAC();if(!ac)return;
 const o=ac.createOscillator(),g=ac.createGain();
 o.connect(g);g.connect(ac.destination);o.type=t;o.frequency.value=f;
 g.gain.setValueAtTime(0,ac.currentTime+delay);
 g.gain.linearRampToValueAtTime(v,ac.currentTime+delay+.01);
 g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+delay+d);
 o.start(ac.currentTime+delay);o.stop(ac.currentTime+delay+d+.05);
}

/* ─── CONFETTI ─── */
function confetti(n=100){
 const c=document.getElementById('cc');if(!c)return;
 c.width=innerWidth;c.height=innerHeight;
 const ctx=c.getContext('2d');
 const COLS=['#00E5FF','#FFD60A','#FF6B47','#69FF47','#C77DFF','#FF3B5B','#00E676'];
 const ps=Array.from({length:n},()=>({
  x:Math.random()*c.width,y:-20,r:4+Math.random()*8,
  vx:(Math.random()-.5)*6,vy:2+Math.random()*5,
  rot:Math.random()*360,vr:(Math.random()-.5)*8,
  col:COLS[Math.floor(Math.random()*COLS.length)],a:1
 }));
 let fr=0;
 (function draw(){
  ctx.clearRect(0,0,c.width,c.height);
  ps.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.rot+=p.vr;p.vy+=.1;
   if(p.y>c.height)p.a=Math.max(0,p.a-.05);
   ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot*Math.PI/180);
   ctx.fillStyle=p.col;ctx.globalAlpha=p.a;ctx.fillRect(-p.r/2,-p.r/2,p.r,p.r);ctx.restore();
  });
  if(ps.some(p=>p.a>0)&&fr++<280)requestAnimationFrame(draw);
  else ctx.clearRect(0,0,c.width,c.height);
 })();
}

/* ─── RANDOM helpers ─── */
function rnd(arr){return arr[Math.floor(Math.random()*arr.length)]}
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function pickQIdxs(pool,count=3){
 /* pick up to `count` questions from pool: at least 1 MC, 1 TF, 1 SA if available */
 const mcs=pool.map((q,i)=>({i,type:q.type}));
 const mcIs=mcs.filter(x=>x.type==='mc').map(x=>x.i);
 const tfIs=mcs.filter(x=>x.type==='tf').map(x=>x.i);
 const saIs=mcs.filter(x=>x.type==='sa').map(x=>x.i);
 const chosen=new Set();
 // pick 1 of each type
 if(mcIs.length) chosen.add(rnd(mcIs));
 if(tfIs.length) chosen.add(rnd(tfIs));
 if(saIs.length) chosen.add(rnd(saIs));
 // fill remaining randomly
 const all=shuffle(pool.map((_,i)=>i));
 for(const i of all){if(chosen.size>=count)break;chosen.add(i);}
 return shuffle([...chosen]).slice(0,count);
}

/* MC */
function selMC(i){
 sClick();
 document.querySelectorAll('.opt').forEach(e=>{e.className='opt'});
 $(`o${i}`).className='opt sel';G.sel=[i];$('ca').style.display='block';
}
function confMC(lvIdx,chIdx){
 if(!G.sel.length)return;sClick();
 const ch=LV[lvIdx].qpool[G.qIdxs[lvIdx][chIdx]];
 const chosen=G.sel[0],ok=chosen===ch.cor;
 const secs=(Date.now()-G.chStart)/1000;
 const spd=ok?Math.max(0,Math.round(50*(1-secs/30))):0;
 const pts=ok?150+spd:0;
 ch.opts.forEach((_,j)=>{const e=$(`o${j}`);if(!e)return;e.disabled=true;if(j===ch.cor)e.className='opt cor';else if(j===chosen&&!ok)e.className='opt wrg'});
 $('ca').style.display='none';
 _scoreIt(ok,pts,lvIdx);
 setTimeout(()=>showFeedback(lvIdx,chIdx,ok,pts,ch.exp),1100);
}
/* TF */
function selTF(val){
 sClick();
 const bt=$('otrue'),bf=$('ofalse');
 bt.className='tf-btn'+(val?' sel-t':'');bf.className='tf-btn'+(!val?' sel-f':'');
 G.sel=[val];$('ca').style.display='block';
}
function confTF(lvIdx,chIdx){
 if(!G.sel.length)return;sClick();
 const ch=LV[lvIdx].qpool[G.qIdxs[lvIdx][chIdx]];
 const chosen=G.sel[0],ok=chosen===ch.cor;
 const secs=(Date.now()-G.chStart)/1000;
 const spd=ok?Math.max(0,Math.round(50*(1-secs/25))):0;
 const pts=ok?100+spd:0;
 const bt=$('otrue'),bf=$('ofalse');
 if(bt)bt.disabled=true;if(bf)bf.disabled=true;
 if(ok){
  const winner=ch.cor?bt:bf;if(winner)winner.className='tf-btn rv-cor';
  const loser=ch.cor?bf:bt;if(loser)loser.className='tf-btn rv-neu';
 } else {
  const picked=chosen?bt:bf;if(picked)picked.className='tf-btn rv-wrg';
  const right=ch.cor?bt:bf;if(right)right.className='tf-btn rv-cor';
 }
 $('ca').style.display='none';
 _scoreIt(ok,pts,lvIdx);
 setTimeout(()=>showFeedback(lvIdx,chIdx,ok,pts,ch.exp),1100);
}
/* SA */
function togSA(i){
 sClick();const el=$(`co${i}`),ck=$(`ck${i}`);
 if(G.picked.includes(i)){G.picked=G.picked.filter(x=>x!==i);el.className='co';ck.style.display='none'}
 else{G.picked.push(i);el.className='co pk';ck.style.display=''}
}
function confSA(lvIdx,chIdx){
 sClick();const ch=LV[lvIdx].qpool[G.qIdxs[lvIdx][chIdx]];
 const correctSet=ch.opts.map((o,i)=>o.c?i:-1).filter(i=>i>=0);
 const picked=G.picked;
 const allOk=correctSet.every(i=>picked.includes(i))&&picked.every(i=>correctSet.includes(i));
 const some=correctSet.some(i=>picked.includes(i));
 const secs=(Date.now()-G.chStart)/1000;
 const spd=allOk?Math.max(0,Math.round(50*(1-secs/40))):0;
 const pts=allOk?200+spd:some?80:0;
 ch.opts.forEach((o,i)=>{const el=$(`co${i}`),ck=$(`ck${i}`);if(!el)return;el.onclick=null;
  if(o.c){el.className='co rv-g';ck.style.display='';ck.textContent='✓'}
  else if(picked.includes(i)){el.className='co rv-b';ck.style.display='';ck.textContent='✗'}
 });
 _scoreIt(allOk,pts,lvIdx,some&&!allOk);
 setTimeout(()=>showFeedback(lvIdx,chIdx,allOk,pts,ch.exp,some&&!allOk),1100);
}
function _scoreIt(ok,pts,lvIdx,partial=false){
 if(ok){sOK();G.total+=pts;G.lvScores[lvIdx]=(G.lvScores[lvIdx]||0)+pts;G.meter=Math.max(0,G.meter-12);G.streak++;G.maxStreak=Math.max(G.maxStreak,G.streak);if(G.streak>=2){const bonus=25;G.total+=bonus;G.lvScores[lvIdx]+=bonus}}
 else if(partial){G.total+=pts;G.lvScores[lvIdx]=(G.lvScores[lvIdx]||0)+pts;G.meter=Math.min(100,G.meter+8);G.streak=0}
 else{sWrong();G.meter=Math.min(100,G.meter+18);G.streak=0}
}

 };
 field.appendChild(span);
 setTimeout(()=>{if(span.parentNode)span.remove()},3500);
}

/* ── LEADERBOARD ── */
async function fetchLB(){
 try{const r=await fetch('/api/leaderboard');if(!r.ok)throw 0;return await r.json()}
 catch{try{return JSON.parse(localStorage.getItem('gg_lb')||'[]').sort((a,b)=>b.score-a.score).slice(0,10)}catch{return[]}}
}
async function submitScore(team,score,players){
 const e={teamName:team,score,players,date:new Date().toLocaleDateString()};
 try{await fetch('/api/submit-score',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(e)})}catch{}
 try{const l=JSON.parse(localStorage.getItem('gg_lb')||'[]');l.push(e);l.sort((a,b)=>b.score-a.score);localStorage.setItem('gg_lb',JSON.stringify(l.slice(0,50)))}catch{}
}
